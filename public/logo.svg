<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <line x1="30" y1="150" x2="170" y2="150" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="30" y1="120" x2="170" y2="120" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="30" y1="90" x2="170" y2="90" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Chart bars -->
  <rect x="38" y="118" width="18" height="32" rx="3" fill="#10b981" fill-opacity="0.4"/>
  <rect x="62" y="104" width="18" height="46" rx="3" fill="#10b981" fill-opacity="0.5"/>
  <rect x="86" y="90" width="18" height="60" rx="3" fill="#10b981" fill-opacity="0.6"/>
  <rect x="110" y="76" width="18" height="74" rx="3" fill="url(#emeraldGrad)" filter="url(#glow)"/>
  <rect x="134" y="60" width="18" height="90" rx="3" fill="url(#emeraldGrad)" filter="url(#glow)"/>

  <!-- Upward arrow on top of last bar -->
  <polygon points="143,44 135,56 151,56" fill="#34d399" filter="url(#glow)"/>

  <!-- OE monogram at top left -->
  <text x="30" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="url(#emeraldGrad)" filter="url(#glow)">OE</text>

  <!-- Bottom label -->
  <text x="100" y="178" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#d1fae5" text-anchor="middle" letter-spacing="3">ODDSEDGE</text>
</svg>
